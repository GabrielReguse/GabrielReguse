name: GitHub Profile 3D Contrib (Marble Acropolis)

on:
  schedule:
    # runs every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution calendar (writes to ./profile-3d-contrib/)
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Publish 3D SVGs to the `output` branch (without wiping it)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH=output
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash the generated SVGs in /tmp so they survive the branch switch
          mkdir -p /tmp/3d-out
          cp -rf profile-3d-contrib/* /tmp/3d-out/

          # IMPORTANT: remove the freshly generated files from the working tree.
          # Otherwise `git checkout output` refuses, because the same paths
          # already exist on the `output` branch and would be overwritten.
          rm -rf profile-3d-contrib

          # Switch to (or create) the output branch, preserving existing contents
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout --orphan "$BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          # Place the 3D SVGs into ./profile-3d-contrib/ on the output branch
          mkdir -p profile-3d-contrib
          cp -f /tmp/3d-out/* profile-3d-contrib/

          git add profile-3d-contrib
          if git diff --cached --quiet; then
            echo "No 3D-contrib changes to commit."
            exit 0
          fi
          git commit -m "chore: update 3D contribution SVGs [skip ci]"
          git push origin "$BRANCH"
