name: Generate Snake (Athena's Sacred Serpent)

on:
  schedule:
    # runs every 12 hours
    - cron: "0 */12 * * *"
  # run manually from the Actions tab
  workflow_dispatch:
  # run on every push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake.svg files (Athens palette)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          # Light mode: deep-blue serpent on sky-to-cloud dot gradient
          # Dark mode:  golden serpent on Aegean-night gradient
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#0c2d5e&color_dots=#fef3c7,#bfdbfe,#3b82f6,#1e4a8c,#0c2d5e
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#e0b84a&color_dots=#0c2d5e,#1e4a8c,#3b82f6,#e0b84a,#fef3c7

      - name: Push snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
