name: GitHub Profile 3D Contrib (Marble Acropolis)

on:
  schedule:
    # runs every 24 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & push generated SVGs
        run: |
          BRANCH_NAME=output
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin $BRANCH_NAME || true
          # Switch to the output branch (create if missing)
          git checkout -B $BRANCH_NAME
          mkdir -p .
          # Copy generated profile-*.svg files into root of branch
          cp -f profile-*.svg . 2>/dev/null || true
          git add profile-*.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: update 3D contribution profile [skip ci]"
            git push -f origin $BRANCH_NAME
          else
            echo "No changes to commit."
          fi
